version: '3'

tasks:
  setup:
    desc: One-time / per-worktree setup (writes local.properties from ANDROID_HOME).
    dir: android
    cmds:
      - 'test -n "$ANDROID_HOME" || (echo "ANDROID_HOME unset — source ~/toolchains/android-env.sh" && exit 1)'
      - 'printf "sdk.dir=%s\n" "$ANDROID_HOME" > local.properties'

  build:
    desc: Build the app.
    dir: android
    cmds:
      - './gradlew assembleDebug'

  lint:
    desc: Lint / static analysis.
    dir: android
    cmds:
      - './gradlew lintDebug'

  test:
    desc: Run unit tests. Mothership records evidence from this task (`mship test`).
    dir: android
    cmds:
      - './gradlew testDebugUnitTest'

  run:
    desc: Install + launch on a connected device/emulator (best-effort; none in CI).
    dir: android
    cmds:
      - './gradlew installDebug'
      - 'adb shell am start -n com.atomikpanda.groundcontrol/.MainActivity'

  capture:
    desc: >
      Capture UI artifacts into $MSHIP_CAPTURE_DIR. Honors MSHIP_CAPTURE_PLATFORM
      (android|ios). Writes screen.png (image) and, on android, layout.xml (layout).
      Assumes the app is already running (see `task run`); does not boot devices.
    cmds:
      - 'test -n "$MSHIP_CAPTURE_DIR" || (echo "MSHIP_CAPTURE_DIR unset — set by mship capture, or pass it for a direct run" >&2 && exit 1)'
      - 'mkdir -p "$MSHIP_CAPTURE_DIR"'
      - |
        case "${MSHIP_CAPTURE_PLATFORM:-android}" in
          android)
            adb exec-out screencap -p > "$MSHIP_CAPTURE_DIR/screen.png"
            # layout is best-effort: a uiautomator failure (secure window,
            # accessibility off, app crash) must NOT fail the task when the
            # screenshot already succeeded — artifact discovery drives reporting.
            adb shell uiautomator dump /sdcard/window_dump.xml >/dev/null \
              && adb pull /sdcard/window_dump.xml "$MSHIP_CAPTURE_DIR/layout.xml" >/dev/null \
              || true
            ;;
          ios)
            xcrun simctl io booted screenshot "$MSHIP_CAPTURE_DIR/screen.png"
            ;;
          *)
            echo "unsupported MSHIP_CAPTURE_PLATFORM: ${MSHIP_CAPTURE_PLATFORM}" >&2
            exit 2
            ;;
        esac
